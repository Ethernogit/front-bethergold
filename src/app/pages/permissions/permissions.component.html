<div class="h-full flex flex-col">

  <app-permissions-list
    [permissions]="permissions"
    [availableModules]="availableModules"
    [isLoading]="isLoadingList"
    (newPermission)="onNewPermission()"
    (editPermission)="onEditPermission($event)"
    (togglePermission)="onTogglePermission($event)"
    (deletePermission)="onDeletePermission($event)" />

  <!-- Permission form panel -->
  @if (showForm) {
  <app-permission-form
    [permission]="selectedPermission"
    [editMode]="editMode"
    [isLoading]="isLoading"
    [availableModules]="availableModules"
    (formSubmit)="onPermissionSubmit($event)"
    (formCancel)="onFormCancel()" />
  }

  <!-- Delete confirmation modal -->
  @if (showDeleteModal) {
  <div class="fixed inset-0 z-[99999] flex items-center justify-center p-4">
    <div class="absolute inset-0 bg-[#191817]/60 backdrop-blur-sm" (click)="cancelDelete()"></div>
    <div class="relative w-full max-w-sm rounded-2xl border border-[#E8D9A0] bg-white shadow-xl dark:border-[#4A474D] dark:bg-[#232126]">
      <div class="p-6 text-center">
        <div class="mx-auto mb-4 flex size-14 items-center justify-center rounded-full bg-error-50 dark:bg-error-500/15">
          <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
            class="text-error-600 dark:text-error-400">
            <polyline points="3 6 5 6 21 6"></polyline>
            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"></path>
            <line x1="10" y1="11" x2="10" y2="17"></line>
            <line x1="14" y1="11" x2="14" y2="17"></line>
          </svg>
        </div>
        <h3 class="font-instrument text-theme-xl font-semibold text-[#191817] dark:text-white mb-2">
          Eliminar Permiso
        </h3>
        <p class="font-instrument text-theme-sm text-[#6B6560] dark:text-gray-400 mb-6">
          ¿Seguro que deseas eliminar
          <span class="font-semibold text-[#191817] dark:text-white">"{{ permissionToDelete?.name }}"</span>?
          Esta acción no se puede deshacer.
        </p>
        <div class="flex gap-3">
          <button (click)="cancelDelete()" [disabled]="isLoading"
            class="flex-1 rounded-xl border border-[#E8D9A0] bg-white px-4 py-2.5 font-instrument text-sm font-medium text-[#46424A] hover:bg-gray-50 dark:border-[#4A474D] dark:bg-[#3a383d] dark:text-gray-300 dark:hover:bg-white/5 transition-all shadow-theme-sm disabled:opacity-50">
            Cancelar
          </button>
          <button (click)="confirmDelete()" [disabled]="isLoading"
            class="flex-1 flex items-center justify-center gap-2 rounded-xl bg-error-600 hover:bg-error-700 px-4 py-2.5 font-instrument text-sm font-semibold text-white shadow-theme-sm transition-all active:scale-[0.98] disabled:opacity-60 disabled:cursor-not-allowed">
            @if (isLoading) {
            <svg class="animate-spin h-4 w-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            Eliminando...
            } @else {
            Eliminar
            }
          </button>
        </div>
      </div>
    </div>
  </div>
  }

</div>
